name: Drift Audit

# Audits every PR for "drift" — divergence between what was logged (commits,
# PR body, docs/LEARNINGS.md) and what the diff actually did — using a
# deterministic Node script. NO API key required. The workflow is read-only:
# it reports drift without mutating the pull-request branch.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # downgraded to read for fork pull requests

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Run read-only drift audit
        env:
          GITHUB_PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }} # via env (same injection posture)
          BASE_REF: ${{ github.base_ref }} # via env, not inline, to avoid template injection
        run: node scripts/audit-drift.mjs --base "origin/${BASE_REF}" --head HEAD --run-checks --strict

      - name: Post audit report comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }} # via env (same injection posture)
        run: gh pr comment "$PR_NUMBER" --body-file audit-report.md

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6.0.0
        with:
          name: drift-audit-${{ github.event.pull_request.number }}
          path: audit-report.md
          if-no-files-found: error
          retention-days: 30
